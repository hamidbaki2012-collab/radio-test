<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>📻 Radio Bahá'ie</title>
  
  <!-- ===== FAVICONS & ICÔNES ===== -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  
  <!-- ===== PWA MANIFEST ===== -->
  <link rel="manifest" href="manifest.json">
  
  <!-- ===== MÉTADONNÉES POUR MOBILE ===== -->
  <meta name="theme-color" content="#1a2a6c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ma Radio FM">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- ===== RESTE DU HEAD ===== -->
</head>

<style>
body {
  font-family: Arial;
  background-color: #1a2a6c;
  background-image:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)),
    url('background.jpg');

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  color: white;
  margin: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center; /* ✅ CENTRAGE */
}


  margin: 0;
  height: 100vh;

  display: flex;
  align-items: center;   /* ⬇️ pousse en bas */
  justify-content: center;
}

}

.container {
  max-width: 480px;
  margin: auto;
}
/* LOGO */
    
    .logo-container {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: white;
  margin: 30px auto;
  display: flex;
  align-items: left;
  justify-content: left;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.3);
      }

   .logo-container img {
   width: 100%;
   height: 100%;
   object-fit: cover;
    }
   
    h1 {
      text-align: center;
      margin: 10px 0 20px;
    }
.status {
  margin: 15px 0;
  text-align: center; /* ✅ centrage horizontal */
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
  background: red;
}

.player-wrapper {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      padding: 20px;
      margin: 10px 0;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
}

/* BOUTON */
#playBtn {
  display: block;
  margin: 20px auto;
  font-size: 22px;
  padding: 15px 40px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  color: white;
  background: #4fc3f7; /* BLEU CLAIR (PLAY par défaut) */
  transition: 0.3s;
}

/* état PLAY (bleu clair) */
#playBtn {
  background: #4fc3f7;
}

/* état PAUSE (rouge) */
#playBtn.active {
  background: #ff4b4b;

}

#playBtn.active {
  background: #ff4b4b;
}

/* VOLUME */
.volume-container {
  margin-top: 15px;
}

input[type=range] {
  width: 100%;
}

/* ONDE */
.radio-wave {
  display: none;
  justify-content: center;
  gap: 5px;
  margin-top: 15px;
}

.radio-wave.active {
  display: flex;
}

.wave {
  width: 6px;
  height: 25px;
  background: white;
  border-radius: 10px;
  animation: waveAnim 1s infinite ease-in-out;
}

.wave:nth-child(2) { animation-delay: 0.2s; }
.wave:nth-child(3) { animation-delay: 0.4s; }

@keyframes waveAnim {
  0%,100% { transform: scaleY(0.4); }
  50% { transform: scaleY(1.2); }
}

</style>
</head>

<body>

<div class="container">

<!-- Défilement standard (gauche à droite) -->
  <marquee loop="100"> Bienvenue sur notre chaine radio privée expérimentale. Heureux de vous avoir parmi nos auditeurs fidèles. Soyez à l'écoute de 19h à 22h.! </marquee>
  
   <!-- Logo -->
    <div class="logo-container">
      <img src="logo.png" alt="Logo Radio" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
      <div class="logo-placeholder" style="display: none;">📻<br>Votre Logo<br>180×180px</div>
    </div>
	
  <h1>🎧 Radio Live</h1>

  <div class="status">
    <span id="statusDot" class="dot"></span>
    <span id="radioStatus">Hors ligne</span>
  </div>

  <div class="player-box">

    <audio id="player">
      <source src="https://fpsnew2.listen2myradio.com:2199/listen.php?ip=212.84.160.3&port=5360&type=s1">
    </audio>

    <br><br>

    <button id="playBtn">▶ Play</button>

    <div class="volume-container">
      🔊 Volume
      <input type="range" min="0" max="100" value="70" id="volume">
    </div>

    <!-- ONDE -->
    <div id="radioWave" class="radio-wave">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>

  </div>

</div>

<script>
const player = document.getElementById("player");
const btn = document.getElementById("playBtn");
const dot = document.getElementById("statusDot");
const status = document.getElementById("radioStatus");
const wave = document.getElementById("radioWave");

// volume
document.getElementById("volume").addEventListener("input", e => {
  player.volume = e.target.value / 100;
});

// play / pause
btn.addEventListener("click", () => {

  if (player.paused) {

    player.play();

    // ✅ FORCER L’AFFICHAGE
    btn.classList.add("active");
    btn.textContent = "⏸ Pause";
    status.textContent = "En direct";
    dot.style.background = "#00ff88";
    wave.classList.add("active");

  } else {

    player.pause();

    // ✅ CACHER
    btn.classList.remove("active");
    btn.textContent = "▶ Play";
    status.textContent = "Hors ligne";
    dot.style.background = "#ff4b4b";
    wave.classList.remove("active");
  }
});

// états audio
player.addEventListener("playing", () => {
  btn.classList.add("active");
  btn.textContent = "⏸ Pause";
  status.textContent = "En direct";
  dot.style.background = "#00ff88";
  wave.classList.add("active");
});

player.addEventListener("pause", () => {
  btn.classList.remove("active");
  btn.textContent = "▶ Play";
  status.textContent = "Hors ligne";
  dot.style.background = "#ff4b4b";
  wave.classList.remove("active");
});

player.addEventListener("error", () => {
  status.textContent = "Erreur flux";
  dot.style.background = "orange";
  wave.classList.remove("active");
});
</script>

</body>
</html>
